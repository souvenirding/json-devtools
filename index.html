<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>JSON DevTools Viewer</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    background: #1e1e1e;
    color: #d4d4d4;
}

/* ========== LEFT ========== */
#left {
    width: 40%;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #333;
    background: #1e1e1e;
}

textarea {
    flex: 1;
    padding: 12px;
    font-size: 13px;
    border: none;
    outline: none;
    resize: none;
    background: #1e1e1e;
    color: #d4d4d4;
    line-height: 1.5;
}

/* ========== RIGHT ========== */
#right {
    width: 60%;
    display: flex;
    flex-direction: column;
}

/* search bar */
#searchBar {
    padding: 8px;
    border-bottom: 1px solid #333;
    background: #252526;
}

#search {
    width: 100%;
    padding: 6px 10px;
    border: 1px solid #cfcfcf;
    background: #ffffff;
    color: #111;
    outline: none;
    border-radius: 4px;
    font-size: 13px;
}

#search::placeholder {
    color: #888;
}

#tree {
    flex: 1;
    overflow: auto;
    padding: 10px 12px;
}

/* ========== TREE ========== */
.node {
    margin-left: 14px;
    border-left: 1px solid #333;
    padding-left: 10px;
}

.row {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    padding: 2px 0;
}

.row:hover {
    background: rgba(255,255,255,0.05);
}

.key {
    color: #9cdcfe;
}

.value {
    color: #ce9178;
}

.path {
    color: #6a9955;
    font-size: 11px;
    opacity: 0.9;
    margin-left: 6px;
}

/* children */
.children {
    margin-left: 10px;
}

.collapsed > .children {
    display: none;
}

/* collapse indicator */
.arrow::before {
    content: "▾";
    display: inline-block;
    width: 12px;
    color: #888;
}

.collapsed > .row .arrow::before {
    content: "▸";
}

/* highlight */
mark {
    background: #264f78;
    color: #fff;
    padding: 0 2px;
}
</style>
</head>

<body>

<!-- LEFT -->
<div id="left">
    <textarea id="input" placeholder="粘贴 JSON 或嵌套 JSON string..."></textarea>
</div>

<!-- RIGHT -->
<div id="right">
    <div id="searchBar">
        <input id="search" placeholder="Search key / value..." />
    </div>
    <div id="tree"></div>
</div>

<script>

/* ========== parse ========== */
function deepParse(v) {
    if (typeof v === "string") {
        try {
            return deepParse(JSON.parse(v));
        } catch {
            return v;
        }
    }

    if (Array.isArray(v)) return v.map(deepParse);

    if (v && typeof v === "object") {
        const o = {};
        for (const k in v) {
            o[k] = deepParse(v[k]);
        }
        return o;
    }

    return v;
}

/* ========== render ========== */
function createNode(key, value, path = "") {
    const wrap = document.createElement("div");
    wrap.className = "node";

    const isObj = value && typeof value === "object";

    const row = document.createElement("div");
    row.className = "row";

    const fullPath = path ? `${path}.${key}` : key;

    const arrow = document.createElement("span");
    arrow.className = "arrow";

    const keyEl = document.createElement("span");
    keyEl.className = "key";
    keyEl.textContent = key;

    const pathEl = document.createElement("span");
    pathEl.className = "path";
    pathEl.textContent = fullPath;

    row.appendChild(arrow);
    row.appendChild(keyEl);
    row.appendChild(pathEl);

    const children = document.createElement("div");
    children.className = "children";

    if (isObj) {
        for (const k in value) {
            children.appendChild(createNode(k, value[k], fullPath));
        }
    } else {
        const val = document.createElement("span");
        val.className = "value";
        val.textContent = `: ${value}`;
        row.appendChild(val);
    }

    row.onclick = () => {
        wrap.classList.toggle("collapsed");
    };

    wrap.appendChild(row);
    wrap.appendChild(children);

    return wrap;
}

/* ========== render root ========== */
let state = null;

function render() {
    const tree = document.getElementById("tree");
    tree.innerHTML = "";

    if (!state) return;

    for (const k in state) {
        tree.appendChild(createNode(k, state[k], ""));
    }
}

/* ========== live update ========== */
function update(text) {
    try {
        state = deepParse(JSON.parse(text));
        render();
    } catch {
        document.getElementById("tree").innerHTML =
            "<span style='color:#f44747'>Invalid JSON</span>";
    }
}

/* ========== search ========== */
function search(query) {
    const nodes = document.querySelectorAll(".node");

    if (!query) {
        nodes.forEach(n => n.style.display = "");
        return;
    }

    const q = query.toLowerCase();

    nodes.forEach(node => {
        const text = node.innerText.toLowerCase();

        if (text.includes(q)) {
            node.style.display = "";

            // auto expand parents
            let p = node;
            while (p) {
                p.classList.remove("collapsed");
                p = p.parentElement?.closest(".node");
            }
        } else {
            node.style.display = "none";
        }
    });
}

/* ========== events ========== */
document.getElementById("input").addEventListener("input", e => {
    update(e.target.value);
});

document.getElementById("search").addEventListener("input", e => {
    search(e.target.value);
});

</script>

</body>
</html>
